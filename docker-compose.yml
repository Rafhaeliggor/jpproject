version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jpproject-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: jpproject
      MYSQL_DATABASE: jpproject
      MYSQL_USER: jpuser
      MYSQL_PASSWORD: jpproject
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  adminer:
    image: adminer
    container_name: jpproject-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
